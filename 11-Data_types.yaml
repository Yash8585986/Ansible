- name: print data types
  hosts: local
  connection: local
  vars:
    PROGRAM: "Devsecops with aws"
    DURATION: 140
    IS_LIVE: true
    DETAILS:
      MONTHS: 4
      Trainer: "Sivakumar Reddy"
    Topics:
    - linux
    - shell
    - ansible
  tasks:
    - name: print variables
      ansible.builtin.debug:
        msg: |
          Program: {{ PROGRAM }}
          Duration: {{ DURATION }}
          Is_live: {{ IS_LIVE }}
          Details: {{ DETAILS }}
          Topics: {{ Topics }}     

