- name: prompt username and password
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: what is your username?
    private: false
  
  - name : password
    prompt: what is your password?
    private: true

  tasks:
  - name: print username and password
    ansible.builtin.debug:
      msg: "Username is: {{ username }}, Password is: {{ password }}"