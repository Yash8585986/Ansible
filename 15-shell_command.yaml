- name: demo on command vs shell
  hosts: local
  connection: local
  tasks:
  - name: command module
    # ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: users_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{ users_output}}"   

  - name: shell module
    ansible.builtin.shell: ls -ltr > files_temp.txt
    register: files_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{ files_output}}"
      