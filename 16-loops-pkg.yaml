- name: "demo on install package"
  hosts: local
  become: yes
  connection: local
  tasks:
    - name: "Demo on install package"
      ansible.builtin.package:
        name : "{{ item.name }}"
        state: "{{ item.state }}"
      loop:
      - { name: "mysql", state: "absent" }
      - { name: "nginx", state: "present" }
      - { name: "zip", state: "absent" }
